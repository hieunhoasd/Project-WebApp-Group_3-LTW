<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTWeb - API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        
        .response.success {
            border-left-color: #4caf50;
            background: #f1f8f5;
        }
        
        .response.error {
            border-left-color: #f44336;
            background: #fff3f3;
        }
        
        .response-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .response-content {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #555;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .info-box h3 {
            margin-bottom: 10px;
        }
        
        .info-box p {
            margin-bottom: 5px;
            font-size: 0.95em;
        }
        
        .user-info {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border-left: 4px solid #2196F3;
        }
        
        .user-info p {
            margin-bottom: 5px;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .status-badge.success {
            background: #4caf50;
            color: white;
        }
        
        .status-badge.error {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 LTWeb API Tester</h1>
        
        <div class="info-box">
            <h3>ℹ️ API Information</h3>
            <p><strong>Base URL:</strong> <span id="baseUrl">http://localhost/LTWeb/login/api/</span></p>
            <p><strong>Status:</strong> <span class="status-badge success">Ready</span></p>
        </div>
        
        <div id="userInfo" class="user-info" style="display: none;">
            <p><strong>Logged In As:</strong> <span id="userName"></span> (<span id="userEmail"></span>)</p>
            <p><strong>Token:</strong> <span id="userToken" style="word-break: break-all; font-size: 0.9em;"></span></p>
            <button class="btn-secondary" onclick="logout()">Logout</button>
        </div>
        
        <div class="grid">
            <!-- Register Card -->
            <div class="card">
                <h2>📝 Register</h2>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="regName" placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="regEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password:</label>
                    <input type="password" id="regPasswordConfirm" placeholder="Confirm password">
                </div>
                <button class="btn-primary" onclick="register()">Register</button>
                <div id="regResponse" class="response" style="display: none;"></div>
            </div>
            
            <!-- Login Card -->
            <div class="card">
                <h2>🔓 Login</h2>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="loginEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="loginPassword" placeholder="Your password">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
                <div id="loginResponse" class="response" style="display: none;"></div>
            </div>
            
            <!-- Get Users Card -->
            <div class="card">
                <h2>👥 Get All Users</h2>
                <div class="form-group">
                    <label>Limit:</label>
                    <input type="text" id="userLimit" value="10">
                </div>
                <div class="form-group">
                    <label>Offset:</label>
                    <input type="text" id="userOffset" value="0">
                </div>
                <button class="btn-primary" onclick="getAllUsers()">Get Users</button>
                <div id="usersResponse" class="response" style="display: none;"></div>
            </div>
            
            <!-- Get User by ID Card -->
            <div class="card">
                <h2>👤 Get User by ID</h2>
                <div class="form-group">
                    <label>User ID:</label>
                    <input type="text" id="userId" placeholder="Enter user ID">
                </div>
                <button class="btn-primary" onclick="getUserById()">Get User</button>
                <div id="userByIdResponse" class="response" style="display: none;"></div>
            </div>
            
            <!-- Create User Card -->
            <div class="card">
                <h2>➕ Create User</h2>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="createName" placeholder="Full Name">
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="createEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="createPassword" placeholder="Password">
                </div>
                <button class="btn-primary" onclick="createUser()">Create</button>
                <div id="createResponse" class="response" style="display: none;"></div>
            </div>
            
            <!-- Update/Delete User Card -->
            <div class="card">
                <h2>✏️ Update/Delete User</h2>
                <div class="form-group">
                    <label>User ID:</label>
                    <input type="text" id="updateUserId" placeholder="Enter user ID">
                </div>
                <div class="form-group">
                    <label>New Name (optional):</label>
                    <input type="text" id="updateName" placeholder="New name">
                </div>
                <div class="form-group">
                    <label>New Email (optional):</label>
                    <input type="email" id="updateEmail" placeholder="New email">
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="updateUser()">Update</button>
                    <button class="btn-secondary" onclick="deleteUser()">Delete</button>
                </div>
                <div id="updateResponse" class="response" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost/LTWeb/login/api/';
        
        // Check if user is logged in from localStorage
        window.addEventListener('load', function() {
            const token = localStorage.getItem('token');
            if (token) {
                const user = JSON.parse(localStorage.getItem('user'));
                updateUserInfo(user, token);
            }
        });
        
        // Register
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            
            const response = await fetch(API_BASE + 'register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, password_confirm: passwordConfirm })
            });
            
            const data = await response.json();
            displayResponse('regResponse', data, response.ok);
            
            if (response.ok) {
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPasswordConfirm').value = '';
            }
        }
        
        // Login
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const response = await fetch(API_BASE + 'login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();
            displayResponse('loginResponse', data, response.ok);
            
            if (response.ok) {
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('user', JSON.stringify(data.data));
                updateUserInfo(data.data, data.data.token);
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            }
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('userInfo').style.display = 'none';
            alert('Logged out successfully');
        }
        
        // Get All Users
        async function getAllUsers() {
            const limit = document.getElementById('userLimit').value;
            const offset = document.getElementById('userOffset').value;
            
            const response = await fetch(API_BASE + `users.php?limit=${limit}&offset=${offset}`);
            const data = await response.json();
            displayResponse('usersResponse', data, response.ok);
        }
        
        // Get User by ID
        async function getUserById() {
            const id = document.getElementById('userId').value;
            
            if (!id) {
                alert('Please enter user ID');
                return;
            }
            
            const response = await fetch(API_BASE + `users.php/${id}`);
            const data = await response.json();
            displayResponse('userByIdResponse', data, response.ok);
        }
        
        // Create User
        async function createUser() {
            const name = document.getElementById('createName').value;
            const email = document.getElementById('createEmail').value;
            const password = document.getElementById('createPassword').value;
            
            const response = await fetch(API_BASE + 'users.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            
            const data = await response.json();
            displayResponse('createResponse', data, response.ok);
            
            if (response.ok) {
                document.getElementById('createName').value = '';
                document.getElementById('createEmail').value = '';
                document.getElementById('createPassword').value = '';
            }
        }
        
        // Update User
        async function updateUser() {
            const id = document.getElementById('updateUserId').value;
            
            if (!id) {
                alert('Please enter user ID');
                return;
            }
            
            const name = document.getElementById('updateName').value;
            const email = document.getElementById('updateEmail').value;
            
            const body = {};
            if (name) body.name = name;
            if (email) body.email = email;
            
            if (Object.keys(body).length === 0) {
                alert('Please enter at least one field to update');
                return;
            }
            
            const response = await fetch(API_BASE + `users.php/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            const data = await response.json();
            displayResponse('updateResponse', data, response.ok);
        }
        
        // Delete User
        async function deleteUser() {
            const id = document.getElementById('updateUserId').value;
            
            if (!id) {
                alert('Please enter user ID');
                return;
            }
            
            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }
            
            const response = await fetch(API_BASE + `users.php/${id}`, {
                method: 'DELETE'
            });
            
            const data = await response.json();
            displayResponse('updateResponse', data, response.ok);
        }
        
        // Display Response
        function displayResponse(elementId, data, isSuccess) {
            const element = document.getElementById(elementId);
            element.innerHTML = `
                <div class="response-title">
                    <span class="status-badge ${isSuccess ? 'success' : 'error'}">
                        ${isSuccess ? '✓ Success' : '✗ Error'}
                    </span>
                </div>
                <div class="response-content">${JSON.stringify(data, null, 2)}</div>
            `;
            element.className = `response ${isSuccess ? 'success' : 'error'}`;
            element.style.display = 'block';
            element.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Update User Info Display
        function updateUserInfo(user, token) {
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userToken').textContent = token;
            document.getElementById('userInfo').style.display = 'block';
        }
    </script>
</body>
</html>
